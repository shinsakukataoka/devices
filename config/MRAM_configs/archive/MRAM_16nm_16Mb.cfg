# -----------------------------
# 16 nm 16 Mb STT-MRAM macro
# -----------------------------

-DesignTarget: RAM_chip
-OutputFilePrefix: MRAM_16nm_16Mb

# Technology node
-ProcessNode: 16
-ProcessNodeR: 16
-ProcessNodeW: 16

-DeviceRoadmap: LOP
-DeviceRoadmapR: LOP
-DeviceRoadmapW: LOP

# Capacity: 16 Mb = 2 MB
-Capacity (MB): 2

# I/O width (can adjust if needed)
-WordWidth (bit): 64

# Associativity is ignored for RAM_chip but must be a power of 2
-Associativity (for cache only): 1

# Wires
-LocalWireType: LocalAggressive
-LocalWireRepeaterType: RepeatedNone
-LocalWireUseLowSwing: No

-GlobalWireType: GlobalAggressive
-GlobalWireRepeaterType: RepeatedNone
-GlobalWireUseLowSwing: No

# Routing and sensing
-Routing: H-tree
-InternalSensing: true

# Cell file
-MemoryCellInputFile: MRAM_16nm.cell

# Environment
-Temperature (K): 350
-UseCactiAssumption: Yes

